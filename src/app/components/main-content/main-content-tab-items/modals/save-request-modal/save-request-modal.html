        <span style="font-weight: 650; font-size: 16px">Подождите..</span>
      </div>
      <div class="requests-info">
        @for (req of requests; track req.id) {
          <span
            >У вас есть не сохраненные изменения в запросе
            <span style="font-weight: 650">{{ req.name }}</span></span
          >
        }
      </div>
    </div>

    <div class="modal-actions">
      @if (requests.length === 1) {
        <button (click)="onClose(true, requests[0])" class="dont-save-button action-button pointer">
          Не сохранять
        </button>
      }

      <button (click)="onClose(false, null)" class="modal-close-button action-button pointer">
        Закрыть
      </button>
      <button
        (click)="handleShowSelectCollection()"
        class="modal-positive-action-button action-button pointer"
      >
        Сохранить
      </button>
    </div>

</div>
