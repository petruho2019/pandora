<div class="delete-collection-modal">
  <modal-header
    [showRewWarningIcon]="true"
    [title]="headerTitle"
    (onClose)="close()"
  ></modal-header>

  <div class="delete-collection-content">
    <p style="margin-bottom: 18px" class="pandora-text">
      Вы уверены что хотите навсегда удалить коллекцию "{{ collectionInfo.collectionName }}"?
    </p>

    <div class="collection-info">
      <p class="collection-name">{{ collectionInfo.collectionName }}</p>

      <p class="collection-path">{{ collectionInfo.collectionPath }}</p>
    </div>

    <p
      style="margin-top: 10px; margin-bottom: 20px; color: rgb(255, 55, 55); font-size: 13px"
      class="pandora-text"
    >
      Это действие невозможно обратить. Файлы коллекции будут полностью удалены с диска.
    </p>

    <div class="delimiter-line"></div>

    <div class="confirm-delete-con">
      <label for="delete-input" class="pandora-text delete-label"
        >Напишите
        <span class="delete-text">удалить</span>
        для подтверждения</label
      >

      <input
        id="delete-input"
        class="pandora-input delete-input"
        placeholder="удалить"
        [(ngModel)]="deleteTemplate"
      />
    </div>

    <div class="modal-actions">
      <button (click)="close()" class="modal-close-button action-button pointer">Закрыть</button>
      <button
        [ngClass]="{
          'disabled-action': deleteTemplate !== 'удалить',
          disabled: deleteTemplate !== 'удалить',
          pointer: deleteTemplate === 'удалить',
        }"
        class="modal-delete-button action-button"
        (click)="deleteTemplate === 'удалить' && deleteCollection()"
      >
        Удалить
      </button>
    </div>
  </div>
</div>
