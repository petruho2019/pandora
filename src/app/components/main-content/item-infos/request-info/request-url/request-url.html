<div class="url-con">
  <div class="request-type-method-info">
    @if (isHttp()) {
      <div
        class="http-request-method method-button pointer"
        [ngClass]="req.method.toLowerCase()"
        (click)="toggleMethods()"
        (click)="$event.stopPropagation()"
      >
        {{ req.method }}
      </div>

      @if (showMethods) {
        <div class="methods-dropdown">
          @for (m of methods; track m) {
            <div
              class="method-item-con"
              (click)="selectMethod(m); $event.stopPropagation()"
              [ngClass]="[req.method === m ? 'active-method' : '']"
            >
              <div class="method-item">
                {{ m }}
              </div>
            </div>
          }
        </div>
      }
    }
  </div>

  <input
    class="url-input"
    placeholder="Напишите путь запроса"
    (input)="showPlaceholder(); handleUrlChanged($event)"
    [(ngModel)]="req.url"
    id="url"
    #url
  />
