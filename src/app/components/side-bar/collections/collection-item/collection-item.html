  <span class="text-ellipsis collection-name">{{ collection.name }}</span>
  <div class="collection-actions" (click)="toggleCollectionActions($event, collection.id)">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="actions-icon"
      width="22"
      height="22"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <circle cx="5" cy="12" r="1"></circle>
      <circle cx="12" cy="12" r="1"></circle>
      <circle cx="19" cy="12" r="1"></circle>
    </svg>

    @if ((currentOpenedCollectionId$ | async) === collection.id) {
      <div class="actions-menu" #actionsMenu (click)="$event.stopPropagation()">
        <div
          class="action-item pointer"
          (click)="this.showAddRequestModal(collection.id, collection.path)"
        >
          Добавить запрос
        </div>
        <div class="action-item" (click)="showCloneCollectionModal(collection.id, collection.name)">
          Клонировать
        </div>
        <div
          class="action-item"
          (click)="showRenameCollectionModal(collection.id, collection.name)"
        >
          Переименовать
        </div>

        <div
          class="action-item"
          (click)="showCloseCollectionModal(collection.id, collection.name, collection.path)"
        >
          Удалить коллекцию
        </div>

        <div class="action-item" (click)="showFolderCollection(collection.id)">
          Открыть в файловой системе
        </div>
      </div>
    }
  </div>
</div>

<ng-template cdkPortal #addRequest>
  <add-request-modal
    (close)="addRequestOverlayRef.detach()"
    (create)="this.addRequest($event)"
    [collectionId]="addRequestCollectionId"
    [collectionPath]="addRequestCollectionPath"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  />
</ng-template>

<ng-template cdkPortal #cloneCollection>
  <clone-collection-modal
    (onClose)="cloneCollectionOverlayRef.detach()"
    (onClone)="this.cloneCollection($event)"
    [collectionName]="cloneCollectionName"
    [collectionId]="cloneCollectionId"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  />
</ng-template>

<ng-template cdkPortal #renameCollection>
  <rename-modal
    (onClose)="renameCollectionOverlayRef.detach()"
    (onRename)="this.renameCollection($event)"
    [itemId]="renameCollectionId"
    [newName]="renameCollectionName"
    [headerTitle]="renameCollectionHeader"
    [namePlaceholder]="renameCollectionPlacholder"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  />
</ng-template>

<ng-template cdkPortal #closeCollection>
  <remove-collection-modal
    (onClose)="removeCollectionOverlayRef.detach()"
    (onRemove)="this.removeCollection($event)"
    [collectionInfo]="removeCollectionInfo"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  />
</ng-template>
