<div class="clone-collection-modal">
  <modal-header [title]="headerTitle" (onClose)="close()"></modal-header>

  <div class="clone-collection-content">
    <div class="collection-name">
      <label for="collection-name" style="margin-bottom: 6px" class="pandora-text">Название</label>
      <input
        [(ngModel)]="newCollectionName"
        type="text"
        id="collection-name"
        placeholder="Название коллекции"
        class="pandora-input"
      />
    </div>

    <div class="select-file-input-con">
      <select-file-input
        [label]="fileInputLabel"
        [placeholder]="fileInputPlaceholder"
        [selectedPath]="collectionPath"
        (onPathSelected)="onPathSelected($event)"
        class="select-collection-path-input"
      ></select-file-input>
      <a class="select-folder-a pointer" (click)="selectPath()">Выбрать</a>
    </div>

      @if (canBeEdit) {
        <input type="text" id="folder-name" class="pandora-input" [(ngModel)]="newFolderName" />
      } @else {
        <div class="current-folder-name-con">
          <p class="current-folder-name">{{ newFolderName }}</p>
        </div>
      }
    </div>

    <div class="modal-actions">
      <button (click)="close()" class="modal-close-button action-button pointer">Закрыть</button>
      <button (click)="cloneCollection()" class="modal-positive-action-button action-button pointer">Создать</button>
    </div>
  </div>
</div>
