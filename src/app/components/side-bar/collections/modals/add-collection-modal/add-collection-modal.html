<div class="add-collection-modal" (click)="$event.stopPropagation()">
  <modal-header [title]="headerTitle" (onClose)="onClose()"></modal-header>

  <div class="add-collection-content">
    <div class="collection-name">
      <label class="pandora-text">Название коллекции</label>
      <input
        [(ngModel)]="collectionName"
        placeholder="Название коллекции"
        class="pandora-input"
        type="text"
      />
    </div>

    <select-file-input
      (onPathSelected)="onPathSelected($event)"
      [placeholder]="fileInputPlaceholder"
      [label]="fileInputLabel"
    ></select-file-input>

    <div class="modal-actions">
      <button (click)="onClose()" class="modal-close-button action-button pointer">Закрыть</button>
      <button (click)="addCollection()" class="modal-positive-action-button action-button pointer">Создать</button>
    </div>
  </div>
</div>
