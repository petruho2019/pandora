<div
  class="request-item pointer"
  tabindex="0"
  [ngClass]="{ 'blur-item': blurService.currentBlurId === request.id }"
  (click)="this.blurService.clearBlur()"
  (click)="addRequestTabItem()"
  (dblclick)="setRequestTabItemIsNotReplaceable()"
  (contextmenu)="onRightClick($event, actionsTrigger)"
  (blur)="onBlurRequest()"
  cdkDrag
  cdkDragHandle
>
  @if (isHttp()) {
    <span class="http-method item-name" [ngClass]="request.method.toLowerCase()">
      {{ request.method }}
    </span>
    <span class="request-name text-ellipsis">
      {{ request.name }}
    </span>
  }

  <div class="request-actions">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="actions-icon"
      width="22"
      height="22"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
      #actionsTrigger
      (click)="toggleActions($event, actionsTrigger)"
    >
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <circle cx="5" cy="12" r="1"></circle>
      <circle cx="12" cy="12" r="1"></circle>
      <circle cx="19" cy="12" r="1"></circle>
    </svg>
  </div>

  @if ((currentOpenRequestId$ | async) === request.id) {}
</div>

<ng-template cdkPortal #clone>
  <clone-request-modal
    [requestName]="request.name"
    (onClone)="handleClone($event)"
    (onClose)="cloneOverlayRef.detach()"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  >
  </clone-request-modal>
</ng-template>

<ng-template cdkPortal #delete>
  <delete-request-modal
    [requestName]="request.name"
    [requestId]="request.id"
    (onDelete)="handleDelete($event)"
    (onClose)="deleteOverlayRef.detach()"
    animate.enter="enter-animation"
    animate.leave="leave-animation"
  >
  </delete-request-modal>
</ng-template>
