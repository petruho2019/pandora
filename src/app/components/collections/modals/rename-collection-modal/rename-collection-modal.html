<div class="rename-collection-modal">
  <modal-header [title]="headerTitle" (onClose)="close()"></modal-header>

  <div class="rename-collection-content">
    <div class="collection-name">
      <label for="collection-name" class="modal-label">Название</label>
      <input type="text" id="collection-name" class="pandora-input" [(ngModel)]="collectionName" />
    </div>

    <div class="modal-actions">
      <button (click)="close()" class="modal-close-button action-button">Закрыть</button>
      <button (click)="renameCollection()" class="modal-create-button action-button">
        Переименовать
      </button>
    </div>
  </div>
</div>
