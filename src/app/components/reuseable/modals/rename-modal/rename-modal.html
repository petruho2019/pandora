<div class="rename-modal">
  <modal-header [title]="headerTitle" (onClose)="close()"></modal-header>

  <div class="rename-content">
    <div class="name">
      <label for="name" class="pandora-text">Название</label>
      <input
        type="text"
        id="name"
        class="pandora-input"
        [placeholder]="namePlaceholder"
        [(ngModel)]="newName"
      />
    </div>

    <ng-content></ng-content>

    <div class="modal-actions">
      <button (click)="close()" class="modal-close-button action-button pointer">Закрыть</button>
      <button (click)="rename()" class="modal-create-button action-button pointer">Переименовать</button>
    </div>
  </div>
</div>
