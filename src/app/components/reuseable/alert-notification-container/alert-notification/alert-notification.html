<div class="alert-notification" (mouseenter)="handleMouseEnter()" (mouseleave)="handleMouseLeave()">
  <div class="error-icon-con">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="15"
      xmlns="http://www.w3.org/2000/svg"
      width="21"
      height="21"
      viewBox="0 0 49 49"
      class="error-icon-svg"
    >
      <circle class="stroke-circle" cx="24.5" cy="24.5" r="23" stroke-width="1" />

      <line x1="14" y1="14" x2="35" y2="35" stroke="white" stroke-width="3" />
      <line x1="35" y1="14" x2="14" y2="35" stroke="white" stroke-width="3" />
    </svg>
  </div>

  <div class="message">{{ message }}</div>
</div>
